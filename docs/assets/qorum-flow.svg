<svg viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc">
<title id="ttl">The Qorum Method — flow</title>
<desc id="desc">変更は実装役からレビュー役へ渡り、リスク階層で仕分けられる。低と中はレビュー後に自分でマージ、高は人間の承認役が決裁する。</desc>
<style>text{font-family:-apple-system,"SF Pro Text","Hiragino Sans",sans-serif;}</style>
<defs>
<marker id="arw" markerWidth="9" markerHeight="9" refX="4.5" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L6,3 L0,6 Z" fill="#aeaeb2"/></marker>
</defs>
<rect width="1080" height="1350" fill="#ffffff"/>

<text x="540" y="74" text-anchor="middle" font-size="32" font-weight="700" fill="#1d1d1f" letter-spacing="-0.6">The Qorum Method</text>
<text x="540" y="108" text-anchor="middle" font-size="18" fill="#86868b">AIに何を「決めさせない」か</text>
<line x1="470" y1="132" x2="610" y2="132" stroke="#e8e8ed" stroke-width="1"/>

<rect x="410" y="156" width="260" height="48" rx="24" fill="#f4f4f6" stroke="#dcdce0" stroke-width="1"/>
<text x="540" y="186" text-anchor="middle" font-size="17" fill="#1d1d1f">変更 / 提案</text>
<line x1="540" y1="206" x2="540" y2="248" stroke="#aeaeb2" stroke-width="1.5" marker-end="url(#arw)"/>

<rect x="330" y="250" width="420" height="82" rx="12" fill="#ffffff" stroke="#d2d2d7" stroke-width="1.5"/>
<text x="540" y="286" text-anchor="middle" font-size="21" font-weight="600" fill="#1d1d1f">実装役　Implementer</text>
<text x="540" y="312" text-anchor="middle" font-size="14" fill="#86868b">AI、または自分</text>
<line x1="540" y1="332" x2="540" y2="372" stroke="#aeaeb2" stroke-width="1.5" marker-end="url(#arw)"/>

<rect x="290" y="374" width="500" height="84" rx="12" fill="#ffffff" stroke="#d2d2d7" stroke-width="1.5"/>
<text x="540" y="408" text-anchor="middle" font-size="21" font-weight="600" fill="#1d1d1f">レビュー役　Reviewer</text>
<text x="540" y="434" text-anchor="middle" font-size="14" fill="#86868b">別の主体 — 検査官であって、設計者ではない</text>
<line x1="540" y1="458" x2="540" y2="498" stroke="#aeaeb2" stroke-width="1.5" marker-end="url(#arw)"/>

<rect x="360" y="500" width="360" height="64" rx="32" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1.5"/>
<text x="540" y="540" text-anchor="middle" font-size="20" font-weight="600" fill="#1d1d1f">リスク階層は？　Risk tier</text>

<line x1="540" y1="564" x2="540" y2="604" stroke="#d2d2d7" stroke-width="1.5"/>
<line x1="185" y1="604" x2="895" y2="604" stroke="#d2d2d7" stroke-width="1.5"/>
<line x1="185" y1="604" x2="185" y2="652" stroke="#aeaeb2" stroke-width="1.5" marker-end="url(#arw)"/>
<line x1="540" y1="604" x2="540" y2="652" stroke="#aeaeb2" stroke-width="1.5" marker-end="url(#arw)"/>
<line x1="895" y1="604" x2="895" y2="652" stroke="#aeaeb2" stroke-width="1.5" marker-end="url(#arw)"/>

<rect x="30" y="656" width="310" height="320" rx="14" fill="#f0f6f2" stroke="#cde0d4" stroke-width="1.5"/>
<circle cx="72" cy="700" r="7" fill="#7aab8a"/>
<text x="88" y="707" font-size="20" font-weight="600" fill="#1d1d1f">低　Low</text>
<line x1="50" y1="728" x2="320" y2="728" stroke="#cde0d4" stroke-width="1"/>
<text x="185" y="792" text-anchor="middle" font-size="17" fill="#1d1d1f">レビュー後、</text>
<text x="185" y="820" text-anchor="middle" font-size="17" fill="#1d1d1f">自分で merge</text>
<text x="185" y="918" text-anchor="middle" font-size="13" fill="#86868b">AI 同士で完結できる</text>

<rect x="385" y="656" width="310" height="320" rx="14" fill="#f8f6ee" stroke="#e4dfc8" stroke-width="1.5"/>
<circle cx="427" cy="700" r="7" fill="#b5a46a"/>
<text x="443" y="707" font-size="20" font-weight="600" fill="#1d1d1f">中　Medium</text>
<line x1="405" y1="728" x2="675" y2="728" stroke="#e4dfc8" stroke-width="1"/>
<text x="540" y="792" text-anchor="middle" font-size="17" fill="#1d1d1f">レビュー → 通知 →</text>
<text x="540" y="820" text-anchor="middle" font-size="17" fill="#1d1d1f">一拍おいて merge</text>
<text x="540" y="918" text-anchor="middle" font-size="13" fill="#86868b">人間は一拍だけ挟む</text>

<rect x="740" y="656" width="310" height="320" rx="14" fill="#f8f0f0" stroke="#e4cdcd" stroke-width="2"/>
<circle cx="782" cy="700" r="7" fill="#b07a7a"/>
<text x="798" y="707" font-size="20" font-weight="600" fill="#1d1d1f">高　High</text>
<line x1="760" y1="728" x2="1030" y2="728" stroke="#e4cdcd" stroke-width="1"/>
<text x="895" y="792" text-anchor="middle" font-size="17" fill="#1d1d1f">人間が決裁。</text>
<text x="895" y="820" text-anchor="middle" font-size="17" fill="#1d1d1f">自動 merge 禁止</text>
<rect x="820" y="882" width="150" height="34" rx="17" fill="#b07a7a"/>
<text x="895" y="905" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">要・人間</text>

<line x1="90" y1="1024" x2="990" y2="1024" stroke="#e8e8ed" stroke-width="1"/>
<text x="540" y="1086" text-anchor="middle" font-size="22" font-weight="600" fill="#1d1d1f">低・中はAIの速度で流れ、高は人間で止まる。</text>
<text x="540" y="1122" text-anchor="middle" font-size="15" fill="#86868b">AIに任せる範囲ではなく、AIに「決めさせない」範囲を引く。</text>

<text x="540" y="1300" text-anchor="middle" font-size="15" fill="#86868b">github.com/shiyamaz/qorum-method　·　The Qorum Method</text>
</svg>
